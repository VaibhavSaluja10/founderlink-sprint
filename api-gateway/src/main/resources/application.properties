server.port=8070
spring.application.name=api-gateway

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[2].id=startup-service
spring.cloud.gateway.routes[2].uri=lb://startup-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/startups/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[3].id=investment-service
spring.cloud.gateway.routes[3].uri=lb://investment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/investments/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[4].id=team-service
spring.cloud.gateway.routes[4].uri=lb://team-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/teams/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[5].id=messaging-service
spring.cloud.gateway.routes[5].uri=lb://messaging-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/messages/**
spring.cloud.gateway.routes[5].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://notification-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/notifications/**
spring.cloud.gateway.routes[6].filters[0]=AuthenticationFilter

# Payment Service Route
spring.cloud.gateway.routes[7].id=payment-service
spring.cloud.gateway.routes[7].uri=lb://payment-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/payments/**
spring.cloud.gateway.routes[7].filters[0]=AuthenticationFilter

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Swagger Aggregation
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth/v3/api-docs
springdoc.swagger-ui.urls[1].name=User Service
springdoc.swagger-ui.urls[1].url=/users/v3/api-docs
springdoc.swagger-ui.urls[2].name=Startup Service
springdoc.swagger-ui.urls[2].url=/startups/v3/api-docs
springdoc.swagger-ui.urls[3].name=Investment Service
springdoc.swagger-ui.urls[3].url=/investments/v3/api-docs
springdoc.swagger-ui.urls[4].name=Team Service
springdoc.swagger-ui.urls[4].url=/teams/v3/api-docs
springdoc.swagger-ui.urls[5].name=Messaging Service
springdoc.swagger-ui.urls[5].url=/messages/v3/api-docs
springdoc.swagger-ui.urls[6].name=Notification Service
springdoc.swagger-ui.urls[6].url=/notifications/v3/api-docs
springdoc.swagger-ui.urls[7].name=Payment Service
springdoc.swagger-ui.urls[7].url=/payments/v3/api-docs

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
